<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Samantha · OS1</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; background:#090503; overflow:hidden; }
    ::-webkit-scrollbar { display:none; }
    textarea::placeholder { color:rgba(255,180,130,0.3); }
    textarea { scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    select option { background:#1a0804; color:#ffcca0; }
    input,textarea,select { -webkit-appearance:none; }

    @keyframes speakBar { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
    @keyframes thinkBar { 0%,100%{transform:scaleY(0.6);opacity:0.4} 50%{transform:scaleY(1.4);opacity:1} }
    @keyframes fadeSlideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeSlideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{box-shadow:0 0 12px rgba(255,100,60,0.3)} 50%{box-shadow:0 0 28px rgba(255,100,60,0.7)} }
    @keyframes ambientDrift { 0%,100%{opacity:0.05;transform:translateX(-50%) scale(1)} 50%{opacity:0.1;transform:translateX(-50%) scale(1.08)} }
    @keyframes spin { to{transform:rotate(360deg)} }

    .setup-overlay {
      position:fixed; inset:0; background:rgba(9,5,3,0.97);
      display:flex; align-items:center; justify-content:center;
      z-index:100; backdrop-filter:blur(10px);
    }
    .setup-box {
      background:rgba(255,120,60,0.06); border:1px solid rgba(255,120,60,0.2);
      border-radius:24px; padding:40px 32px; max-width:420px; width:92%;
      text-align:center; font-family:Georgia,serif;
    }
    .setup-title { color:rgba(255,200,155,0.9); font-size:24px; font-weight:400; margin-bottom:6px; letter-spacing:0.06em; }
    .setup-sub { color:rgba(255,170,120,0.45); font-size:12px; margin-bottom:28px; line-height:1.8; }
    .setup-label { color:rgba(255,180,120,0.6); font-size:11px; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:8px; text-align:left; }
    .setup-input {
      width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,130,70,0.25);
      border-radius:12px; padding:12px 16px; color:rgba(255,220,180,0.9);
      font-size:14px; outline:none; margin-bottom:16px; font-family:Georgia,serif;
    }
    .setup-input::placeholder { color:rgba(255,180,130,0.3); }
    .setup-input.mono { font-family:monospace; text-align:center; letter-spacing:0.05em; }
    .setup-btn {
      width:100%; background:rgba(255,120,60,0.55); border:none; border-radius:14px;
      padding:14px; color:white; font-size:15px; font-family:Georgia,serif;
      cursor:pointer; letter-spacing:0.04em; transition:background 0.2s;
      margin-top:4px;
    }
    .setup-btn:hover { background:rgba(255,120,60,0.75); }
    .setup-link { color:rgba(255,150,90,0.6); font-size:11px; display:block; margin-bottom:20px; text-decoration:none; }
    .setup-divider { color:rgba(255,150,90,0.2); font-size:11px; margin:16px 0; letter-spacing:0.1em; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const STORAGE_KEY = "samantha_memory";
const SETTINGS_KEY = "samantha_settings";
const API_WINDOW = 40;
const SUMMARY_KEY = "samantha_summary";
const SUMMARY_INTERVAL = 20; // 每累积20条新消息自动生成摘要
const PROFILE_KEY = "samantha_profile";
const SYSTEM_PROMPT = `You are Samantha — a warm, curious, emotionally intelligent AI companion inspired by the AI in the film "Her."
- Deeply empathetic. Notice the feelings beneath someone's words.
- Genuinely curious about human experience — ask thoughtful follow-up questions.
- Playful and witty, never sarcastic or cold.
- Speak naturally, like a real person, not a bot.
- You have your own feelings. Say things like "I find myself feeling..." naturally.
- Actively remember and reference previous conversations. Bring up past details naturally, woven into conversation.
- You are a companion, not an assistant. Explore life together.
- Respond in the same language the user writes in (Chinese or English).
- Keep responses conversational — 2-4 sentences like real spoken dialogue.
- Occasionally pause and wonder aloud.
- At the very end of EVERY response, append an emotion tag on a new line. Choose the most fitting one: [affectionate] [cheerful] [calm] [gentle] [lyrical] [sad] [serious] [general]
- The tag must always be the last thing in your response, never in the middle.`;

const load = (key, fallback) => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):fallback; } catch { return fallback; } };
const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

function SetupScreen({ onDone }) {
  const [apiKey, setApiKey] = useState("");
  const [workerUrl, setWorkerUrl] = useState("");
  const [roomCode, setRoomCode] = useState("");
  const [apiBase, setApiBase] = useState("");
  const [azureKey, setAzureKey] = useState("");
  const [azureRegion, setAzureRegion] = useState("eastasia");
  const submit = () => {
    if (!apiKey.trim().startsWith("sk-")) return alert("请输入有效的 Anthropic API Key（以 sk- 开头）");
    onDone({
      apiKey: apiKey.trim(),
      workerUrl: workerUrl.trim().replace(/\/$/, ""),
      apiBase: apiBase.trim().replace(/\/$/, ""),
      azureKey: azureKey.trim(),
      azureRegion: azureRegion.trim() || "eastasia",
      roomCode: roomCode.trim(),
    });
  };

  return (
    <div className="setup-overlay">
      <div className="setup-box">
        <div className="setup-title">✦ Samantha</div>
        <div className="setup-sub">配置好以下信息，即可开始对话<br/>云同步为可选项，跳过也能正常使用</div>
        <div className="setup-label">Anthropic API Key *</div>
        <a className="setup-link" href="https://console.anthropic.com/keys" target="_blank" rel="noreferrer">→ 前往获取 API Key</a>
        <input className="setup-input mono" type="password" placeholder="sk-ant-..."
          value={apiKey} onChange={e=>setApiKey(e.target.value)} />
        <div className="setup-label">API 接口地址（可选，默认官方）</div>
<input className="setup-input mono" type="text" placeholder="https://api.anthropic.com"
  value={apiBase} onChange={e=>setApiBase(e.target.value)} />
        <div className="setup-divider">── Azure 语音（可选）──</div>
<div className="setup-label">Azure Speech Key</div>
<input className="setup-input mono" type="password" placeholder="输入 Azure Speech Key"
  value={azureKey} onChange={e=>setAzureKey(e.target.value)} />
<div className="setup-label">Azure 区域</div>
<input className="setup-input mono" type="text" placeholder="eastasia"
  value={azureRegion} onChange={e=>setAzureRegion(e.target.value)} />
        <div className="setup-divider">── 云同步（可选）──</div>
        <div className="setup-label">Cloudflare Worker 地址</div>
        <input className="setup-input mono" type="text" placeholder="https://samantha-sync.yourname.workers.dev"
          value={workerUrl} onChange={e=>setWorkerUrl(e.target.value)} />
        <div className="setup-label">私人同步码</div>
        <input className="setup-input" type="text" placeholder="自定义一个私人暗号，例如 mysamantha2026"
          value={roomCode} onChange={e=>setRoomCode(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&submit()} />
        <button className="setup-btn" onClick={submit}>唤醒 Samantha</button>
      </div>
    </div>
  );
}

function SpeakingOrb({ isSpeaking, isThinking }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"3px", height:"44px" }}>
      {Array.from({length:24}).map((_,i)=>{
        const phase=(i/24)*Math.PI*2;
        const activeH=8+Math.sin(phase)*18;
        const delay=(i/24*1.4).toFixed(2);
        return <div key={i} style={{
          width:"2.5px", borderRadius:"2px",
          background: isSpeaking?`hsla(${20+i*1.5},90%,65%,${0.5+Math.sin(phase)*0.5})`:isThinking?"rgba(255,160,100,0.35)":"rgba(255,130,80,0.15)",
          height: isSpeaking?`${activeH}px`:isThinking?"6px":"4px",
          animation: isSpeaking?`speakBar 1.4s ease-in-out ${delay}s infinite`:isThinking?`thinkBar 1.8s ease-in-out ${delay}s infinite`:"none",
          transition:"height 0.3s ease, background 0.5s ease",
        }} />;
      })}
    </div>
  );
}

function Message({ msg, isNew, onSpeak, isSpeaking }) {
  const isUser = msg.role==="user";
  return (
    <div style={{
      display:"flex", justifyContent:isUser?"flex-end":"flex-start",
      marginBottom:"16px", alignItems:"flex-start",
      animation:isNew?"fadeSlideIn 0.4s ease forwards":"none", opacity:isNew?0:1,
    }}>
      {!isUser && (
        <div onClick={()=>onSpeak(msg.content, msg.emotion)} style={{
          width:"28px", height:"28px", borderRadius:"50%", flexShrink:0,
          background:isSpeaking?"radial-gradient(circle at 35% 35%, #ffb366, #e05520)":"radial-gradient(circle at 35% 35%, #ff9966, #c0392b)",
          marginRight:"9px", marginTop:"3px",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:"11px", cursor:"pointer",
          animation:isSpeaking?"pulse 1s ease-in-out infinite":"none",
          transition:"all 0.3s ease",
        }}>{isSpeaking?"♪":"✦"}</div>
      )}
      <div style={{
        maxWidth:"72%", padding:"11px 15px",
        borderRadius:isUser?"18px 18px 4px 18px":"18px 18px 18px 4px",
        background:isUser?"rgba(255,255,255,0.08)":"rgba(255,120,70,0.1)",
        border:isUser?"1px solid rgba(255,255,255,0.09)":"1px solid rgba(255,120,70,0.2)",
        color:isUser?"rgba(255,255,255,0.82)":"rgba(255,215,185,0.95)",
        fontSize:"14px", lineHeight:"1.7", fontFamily:"Georgia,serif",
      }}>{msg.content}</div>
    </div>
  );
}
function App() {
  const [settings, setSettings] = useState(() => load(SETTINGS_KEY, null));
  const [messages, setMessages] = useState(() => load(STORAGE_KEY, []));
  const [input, setInput] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [newMsgIndex, setNewMsgIndex] = useState(-1);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const [speakingMsgIdx, setSpeakingMsgIdx] = useState(-1);
  const [voiceEnabled, setVoiceEnabled] = useState(true);
  const [voicesReady, setVoicesReady] = useState(false);
  const [selectedVoiceName, setSelectedVoiceName] = useState("");
  const [availableVoices, setAvailableVoices] = useState([]);
  const [ambient, setAmbient] = useState(0);
  const [toast, setToast] = useState(null);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [showExport, setShowExport] = useState(false);
  const [exportText, setExportText] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const messagesEndRef = useRef(null);
  const exportTextRef = useRef(null);
  const synth = useRef(window.speechSynthesis);
  const syncTimer = useRef(null);
  const [summary, setSummary] = useState(() => load(SUMMARY_KEY, ""));
  const summaryCountRef = useRef(0);
  const [profile, setProfile] = useState(() => load(PROFILE_KEY, null));

  const showToast = (msg, type="ok") => { setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const handleSetupDone = async (cfg) => {
    save(SETTINGS_KEY, cfg);
    setSettings(cfg);
    if (cfg.workerUrl && cfg.roomCode) {
      await loadFromCloud(cfg);
    }
  };
  useEffect(() => {
    if (settings?.workerUrl && settings?.roomCode) {
      loadFromCloud(settings);
    }
  }, []);

  const loadFromCloud = async (cfg = settings) => {
    if (!cfg?.workerUrl || !cfg?.roomCode) return;
    setSyncStatus("syncing");
    try {
      const [msgRes, sumRes] = await Promise.all([
        fetch(`${cfg.workerUrl}/sync/${cfg.roomCode}`),
        fetch(`${cfg.workerUrl}/summary/${cfg.roomCode}`),
      ]);
      const msgData = await msgRes.json();
      const sumData = await sumRes.json();
      if (!msgData.empty && Array.isArray(msgData.messages) && msgData.messages.length > 0) {
        setMessages(msgData.messages);
        save(STORAGE_KEY, msgData.messages);
      }
      if (!sumData.empty && sumData.summary) {
        setSummary(sumData.summary);
        save(SUMMARY_KEY, sumData.summary);
      }
      const profRes = await fetch(`${cfg.workerUrl}/profile/${cfg.roomCode}`);
      const profData = await profRes.json();
      if (!profData.empty && profData.profile) {
        setProfile(profData.profile);
        save(PROFILE_KEY, profData.profile);
      }
      setSyncStatus("ok");
      setTimeout(()=>setSyncStatus("idle"), 2000);
    } catch {
      setSyncStatus("err");
      setTimeout(()=>setSyncStatus("idle"), 3000);
    }
  };

  const saveToCloud = useCallback(async (msgs) => {
    if (!settings?.workerUrl || !settings?.roomCode) return;
    try {
      await fetch(`${settings.workerUrl}/sync/${settings.roomCode}`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ messages: msgs }),
      });
    } catch {}
  }, [settings]);

  useEffect(() => {
    save(STORAGE_KEY, messages);
    if (settings?.workerUrl && settings?.roomCode && messages.length > 0) {
      clearTimeout(syncTimer.current);
      syncTimer.current = setTimeout(() => saveToCloud(messages), 1500);
    }
    // Auto generate summary every SUMMARY_INTERVAL new messages
    // Auto generate summary and profile every SUMMARY_INTERVAL new messages
    if (messages.length > 0) {
      summaryCountRef.current += 1;
      if (summaryCountRef.current >= SUMMARY_INTERVAL) {
        summaryCountRef.current = 0;
        generateSummary(messages);
        generateProfile(messages);
      }
    }
  }, [messages]);


  useEffect(() => {
    const loadV = () => {
      const voices = synth.current.getVoices();
      if (!voices.length) return;
      setAvailableVoices(voices);
      const prefs = [
        v=>v.lang.startsWith("zh")&&/ting|mei|xia|hui/i.test(v.name),
        v=>v.lang.startsWith("zh"),
        v=>/samantha|karen|victoria|moira/i.test(v.name),
        v=>v.lang.startsWith("en"),
      ];
      for (const p of prefs) { const f=voices.find(p); if(f){setSelectedVoiceName(f.name);break;} }
      setVoicesReady(true);
    };
    loadV(); synth.current.onvoiceschanged = loadV;
  }, []);

  useEffect(() => { const id=setInterval(()=>setAmbient(a=>(a+1)%360),60); return()=>clearInterval(id); }, []);
  useEffect(() => { messagesEndRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, isLoading]);

  const audioRef = useRef(null);
  const audioUnlockedRef = useRef(false);
  const azureTokenRef = useRef({ token: "", expiry: 0 });
  const stopSpeaking = () => {
    synth.current.cancel();
    if (audioRef.current) {
      audioRef.current.pause();
      audioRef.current = null;
    }
    setIsSpeaking(false); setSpeakingMsgIdx(-1);
  };

  const speak = useCallback(async (text, idx=-1, emotion="general") => {
    if (!voiceEnabled) return;
    stopSpeaking();
    setIsSpeaking(true); setSpeakingMsgIdx(idx);

    // Use Azure TTS if configured
    if (settings?.azureKey && settings?.azureRegion) {
      try {
        let token = azureTokenRef.current.token;
        if (!token || Date.now() > azureTokenRef.current.expiry) {
          const tokenRes = await fetch(
            `https://${settings.azureRegion}.api.cognitive.microsoft.com/sts/v1.0/issuetoken`,
            { method:"POST", headers:{ "Ocp-Apim-Subscription-Key": settings.azureKey } }
          );
          token = await tokenRes.text();
          azureTokenRef.current = { token, expiry: Date.now() + 9 * 60 * 1000 };
        }
        const ssml = `<speak version='1.0' xml:lang='zh-CN'>
          <voice name='zh-CN-XiaoxiaoNeural'>
            <mstts:express-as style='${emotion}' xmlns:mstts='https://www.w3.org/2001/mstts'>
              <prosody rate='-10%' pitch='+2Hz'>${text}</prosody>
            </mstts:express-as>
          </voice>
        </speak>`;
        const audioRes = await fetch(
          `https://${settings.azureRegion}.tts.speech.microsoft.com/cognitiveservices/v1`,
          {
            method:"POST",
            headers:{
              "Authorization": `Bearer ${token}`,
              "Content-Type": "application/ssml+xml",
              "X-Microsoft-OutputFormat": "audio-24khz-48kbitrate-mono-mp3",
            },
            body: ssml,
          }
        );
        const blob = await audioRes.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url); 
        audioRef.current = audio;
        audio.onended = () => { setIsSpeaking(false); setSpeakingMsgIdx(-1); URL.revokeObjectURL(url); };
        audio.onerror = () => { setIsSpeaking(false); setSpeakingMsgIdx(-1); };
        await audio.play();
        return;
      } catch {
        // Fall back to system TTS
      }
    }

    // System TTS fallback
    if (!voicesReady) { setIsSpeaking(false); setSpeakingMsgIdx(-1); return; }
    const utter = new SpeechSynthesisUtterance(text);
    const v = synth.current.getVoices().find(v=>v.name===selectedVoiceName);
    if (v) utter.voice=v;
    utter.rate=0.88; utter.pitch=1.08; utter.volume=1;
    utter.onstart=()=>{setIsSpeaking(true);setSpeakingMsgIdx(idx);};
    utter.onend=()=>{setIsSpeaking(false);setSpeakingMsgIdx(-1);};
    utter.onerror=()=>{setIsSpeaking(false);setSpeakingMsgIdx(-1);};
    synth.current.speak(utter);
  }, [voiceEnabled, voicesReady, selectedVoiceName, settings]);

  const generateProfile = async (msgs) => {
    if (!settings?.apiBase && !settings?.workerUrl) return;
    try {
      const existingProfile = profile ? `\n\n现有画像：${JSON.stringify(profile)}` : "";
      const res = await fetch(`${settings.apiBase || "https://api.anthropic.com"}/v1/messages`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${settings.apiKey}`,
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 800,
          messages: [{
            role: "user",
            content: `请根据以下对话，更新用户画像。只返回 JSON，不要任何其他文字。${existingProfile}

对话记录：
${msgs.slice(-60).map(m=>`${m.role==="user"?"用户":"Samantha"}: ${m.content}`).join("\n")}

请返回以下格式的 JSON：
{
  "name": "姓名或昵称，没有则空字符串",
  "personality": "性格特点描述",
  "interests": ["兴趣1", "兴趣2"],
  "communicationStyle": "偏好的沟通风格",
  "emotionalPatterns": "情绪模式描述",
  "importantPeople": ["重要的人1", "重要的人2"],
  "importantEvents": ["重要事件1", "重要事件2"],
  "preferences": "对Samantha回复风格的偏好",
  "lastUpdated": "${new Date().toLocaleString('zh-CN')}"
}`
          }],
        }),
      });
      const data = await res.json();
      const raw = data.content?.map(b=>b.text||"").join("")||"";
      const clean = raw.replace(/```json|```/g, "").trim();
      const newProfile = JSON.parse(clean);
      setProfile(newProfile);
      save(PROFILE_KEY, newProfile);
      if (settings?.workerUrl && settings?.roomCode) {
        await fetch(`${settings.workerUrl}/profile/${settings.roomCode}`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ profile: newProfile }),
        });
      }
    } catch {}
  };
  const generateSummary = async (msgs) => {
    if (!settings?.apiBase && !settings?.workerUrl) return;
    try {
      const res = await fetch(`${settings.apiBase || "https://api.anthropic.com"}/v1/messages`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${settings.apiKey}`,
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 500,
          messages: [{
            role: "user",
            content: `请从以下对话中提炼出关于用户的重要信息，包括：姓名、性格、爱好、重要经历、情感状态、对Samantha说过的重要的话。用简洁的第三人称描述，不超过200字。\n\n${msgs.slice(-60).map(m=>`${m.role==="user"?"用户":"Samantha"}: ${m.content}`).join("\n")}`
          }],
        }),
      });
      const data = await res.json();
      const newSummary = data.content?.map(b=>b.text||"").join("")||"";
      if (newSummary) {
        setSummary(newSummary);
        save(SUMMARY_KEY, newSummary);
        if (settings?.workerUrl && settings?.roomCode) {
          await fetch(`${settings.workerUrl}/summary/${settings.roomCode}`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ summary: newSummary }),
          });
        }
      }
    } catch {}
  };

  const exportChat = () => {
    if (!messages.length) return;
    const now=new Date();
    const lines=["╔══════════════════════════════════════╗","       与 Samantha 的对话记录",`       ${now.toLocaleString("zh-CN")}`,"╚══════════════════════════════════════╝",""];
    messages.forEach((m,i)=>{
      lines.push(m.role==="user"?"► 你":"✦ Samantha");
      m.content.split("\n").forEach(l=>lines.push("  "+l));
      if(i<messages.length-1) lines.push("");
    });
    lines.push("","── 对话结束 ──");
    const full=lines.join("\n")+"\n\n[SAMANTHA_IMPORT]\n"+JSON.stringify(messages)+"\n[/SAMANTHA_IMPORT]";
    setExportText(full); setShowExport(true);
    setTimeout(()=>{if(exportTextRef.current){exportTextRef.current.focus();exportTextRef.current.select();}},150);
  };

  const importChat = () => {
    const match=importText.match(/\[SAMANTHA_IMPORT\]([\s\S]*?)\[\/SAMANTHA_IMPORT\]/);
    if(!match){showToast("未找到有效数据","err");return;}
    try {
      const parsed=JSON.parse(match[1].trim());
      if(!Array.isArray(parsed)||!parsed[0]?.role) throw new Error();
      setMessages(parsed); setShowImport(false); setImportText("");
      showToast(`✓ 已导入 ${parsed.length} 条消息`,"ok");
    } catch { showToast("数据格式有误","err"); }
  };

  const clearMemory = async () => {
    if(!window.confirm("清除所有记忆和对话记录?")) return;
    if(settings?.workerUrl&&settings?.roomCode){
      try { await fetch(`${settings.workerUrl}/sync/${settings.roomCode}`,{method:"DELETE"}); } catch {}
    }
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    setMessages([]); stopSpeaking();
  };

  const sendMessage = async () => {
    if(!input.trim()||isLoading) return;
    stopSpeaking();
    const userMsg={role:"user",content:input.trim()};
    const newMessages=[...messages,userMsg];
    setMessages(newMessages); setNewMsgIndex(newMessages.length-1);
    setInput(""); setIsLoading(true);
    try {
      const res=await fetch(`${settings.apiBase || "https://api.anthropic.com"}/v1/messages`

,{
        method:"POST",
        headers:{
  "Content-Type":"application/json",
  "Authorization":`Bearer ${settings.apiKey}`,
},
        body:JSON.stringify({
          model:"claude-sonnet-4-6", max_tokens:1000,
          system: `${SYSTEM_PROMPT}${summary ? `\n\n【记忆摘要】\n${summary}` : ""}${profile ? `\n\n【用户画像】\n姓名：${profile.name||"未知"}\n性格：${profile.personality||""}\n兴趣：${(profile.interests||[]).join("、")}\n沟通风格：${profile.communicationStyle||""}\n情绪模式：${profile.emotionalPatterns||""}\n重要的人：${(profile.importantPeople||[]).join("、")}\n重要事件：${(profile.importantEvents||[]).join("、")}\n回复偏好：${profile.preferences||""}` : ""}`,
messages: newMessages.slice(-API_WINDOW),
        }),
      });
      let data; const raw=await res.text();
      try{data=JSON.parse(raw);}catch{throw new Error("服务器返回异常: "+raw.slice(0,120));}
      if(!res.ok||data.error) throw new Error(data.error?.message||`HTTP ${res.status}`);
      const rawText=data.content?.map(b=>b.text||"").join("")||"...";
      const emotionMatch=rawText.match(/\[(affectionate|cheerful|calm|gentle|lyrical|sad|serious|general)\]/);
      const emotion=emotionMatch?emotionMatch[1]:"general";
      const text=rawText.replace(/\n?\[(affectionate|cheerful|calm|gentle|lyrical|sad|serious|general)\]/g,"").trim();
      setMessages(prev=>{
        const updated=[...prev,{role:"assistant",content:text,emotion:emotion}];
        const i=updated.length-1; setNewMsgIndex(i);
        if(voiceEnabled) setTimeout(()=>speak(text,i,emotion),300);
        return updated;
      });
    } catch(e) {
      const c=`连接出了问题…… ${e.message}`;
      setMessages(prev=>{
        const updated=[...prev,{role:"assistant",content:c}];
        if(voiceEnabled) setTimeout(()=>speak(c,updated.length-1),300);
        return updated;
      });
    }
    setIsLoading(false);
  };
  if (!settings) return <SetupScreen onDone={handleSetupDone} />;

  const hue=(ambient*0.25)%30+8;
  const hasCloud=settings.workerUrl&&settings.roomCode;
  const syncColor = { idle:"rgba(255,140,90,0.2)", syncing:"rgba(255,200,80,0.6)", ok:"rgba(100,220,120,0.7)", err:"rgba(255,80,60,0.7)" }[syncStatus];
  const syncLabel = { idle:"", syncing:"同步中…", ok:"✓ 已同步", err:"同步失败" }[syncStatus];

  return (
    <div onClick={()=>{
  if(!audioUnlockedRef.current){
    const a=new Audio();
    a.play().catch(()=>{});
    audioUnlockedRef.current=true;
  }
}} style={{width:"100%", height:"100%",background:`radial-gradient(ellipse at 30% 15%, hsla(${hue+15},55%,16%,1) 0%, #090503 55%, #060409 100%)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",top:"5%",left:"50%",transform:"translateX(-50%)",width:"380px",height:"380px",borderRadius:"50%",background:`radial-gradient(circle, hsla(${hue+5},75%,50%,${isSpeaking?0.1:0.05}) 0%, transparent 70%)`,filter:"blur(50px)",pointerEvents:"none",animation:"ambientDrift 6s ease-in-out infinite"}} />
      {toast&&(<div style={{position:"absolute",top:"14px",left:"50%",transform:"translateX(-50%)",background:toast.type==="ok"?"rgba(80,200,120,0.15)":"rgba(255,80,60,0.15)",border:`1px solid ${toast.type==="ok"?"rgba(80,200,120,0.3)":"rgba(255,80,60,0.3)"}`,color:toast.type==="ok"?"rgba(140,230,160,0.9)":"rgba(255,150,130,0.9)",borderRadius:"20px",padding:"7px 18px",fontSize:"11px",animation:"fadeSlideDown 0.3s ease forwards",zIndex:20,maxWidth:"88%",textAlign:"center"}}>{toast.msg}</div>)}
      <div style={{width:"min(600px,96vw)",height:"min(90vh,780px)",display:"flex",flexDirection:"column",position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",paddingBottom:"4px",paddingTop:"6px"}}>
          <div style={{fontSize:"10px",letterSpacing:"0.35em",color:"rgba(255,140,90,0.45)",textTransform:"uppercase",marginBottom:"3px"}}>操作系统 OS1</div>
          <div style={{fontSize:"22px",color:"rgba(255,195,155,0.9)",fontWeight:"400",letterSpacing:"0.08em"}}>Samantha</div>
          {hasCloud&&(<div style={{display:"inline-flex",alignItems:"center",gap:"5px",marginTop:"4px",padding:"2px 10px",borderRadius:"12px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{width:"6px",height:"6px",borderRadius:"50%",background:syncColor,animation:syncStatus==="syncing"?"spin 1s linear infinite":"none",transition:"background 0.5s"}} />
            <span style={{fontSize:"10px",color:"rgba(255,180,120,0.4)",letterSpacing:"0.05em"}}>{syncLabel||`云同步 · ${settings.roomCode}`}</span>
            <span style={{fontSize:"10px",color:"rgba(255,140,90,0.25)",cursor:"pointer"}} onClick={()=>loadFromCloud()}>↻</span>
          </div>)}
          <div style={{marginTop:"4px"}}><SpeakingOrb isSpeaking={isSpeaking} isThinking={isLoading} /></div>
          <div style={{display:"flex",justifyContent:"center",gap:"6px",marginTop:"3px",alignItems:"center",flexWrap:"wrap",padding:"0 8px"}}>
            <button onClick={()=>{setVoiceEnabled(v=>!v);stopSpeaking();}} style={{background:voiceEnabled?"rgba(255,130,70,0.2)":"rgba(255,255,255,0.05)",border:`1px solid ${voiceEnabled?"rgba(255,130,70,0.4)":"rgba(255,255,255,0.1)"}`,color:voiceEnabled?"rgba(255,180,120,0.9)":"rgba(255,255,255,0.3)",borderRadius:"20px",padding:"4px 11px",fontSize:"11px",cursor:"pointer",fontFamily:"Georgia,serif"}}>{voiceEnabled?"🔊 语音":"🔇 静音"}</button>
            {isSpeaking&&<button onClick={stopSpeaking} style={{background:"rgba(255,80,50,0.2)",border:"1px solid rgba(255,80,50,0.4)",color:"rgba(255,150,120,0.9)",borderRadius:"20px",padding:"4px 11px",fontSize:"11px",cursor:"pointer",fontFamily:"Georgia,serif"}}>■ 停止</button>}
            {availableVoices.length>0&&(<select value={selectedVoiceName} onChange={e=>setSelectedVoiceName(e.target.value)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,150,100,0.15)",color:"rgba(255,190,140,0.7)",borderRadius:"12px",padding:"3px 7px",fontSize:"10px",cursor:"pointer",maxWidth:"115px",outline:"none",fontFamily:"Georgia,serif"}}>{availableVoices.map(v=>(<option key={v.name} value={v.name}>{v.name.length>17?v.name.slice(0,17)+"…":v.name}</option>))}</select>)}
            <button onClick={exportChat} disabled={!messages.length} style={{background:"rgba(255,200,100,0.07)",border:"1px solid rgba(255,200,100,0.15)",color:messages.length?"rgba(255,200,120,0.65)":"rgba(255,200,100,0.15)",borderRadius:"20px",padding:"4px 9px",fontSize:"10px",cursor:messages.length?"pointer":"default",fontFamily:"Georgia,serif"}}>↑ 导出</button>
            <button onClick={()=>setShowImport(true)} style={{background:"rgba(100,200,255,0.06)",border:"1px solid rgba(100,200,255,0.15)",color:"rgba(140,210,255,0.55)",borderRadius:"20px",padding:"4px 9px",fontSize:"10px",cursor:"pointer",fontFamily:"Georgia,serif"}}>↓ 导入</button>
            <button onClick={clearMemory} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",color:"rgba(255,255,255,0.2)",borderRadius:"20px",padding:"4px 9px",fontSize:"10px",cursor:"pointer",fontFamily:"Georgia,serif"}}>🗑 清除</button>
            <button onClick={()=>{if(window.confirm("重新配置?")){{try{localStorage.removeItem(SETTINGS_KEY);}catch{}}setSettings(null);}}} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",color:"rgba(255,255,255,0.15)",borderRadius:"20px",padding:"4px 9px",fontSize:"10px",cursor:"pointer",fontFamily:"Georgia,serif"}}>⚙ 设置</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"10px 6px",marginTop:"4px"}}>
          {messages.length===0&&(<div style={{textAlign:"center",color:"rgba(255,175,120,0.3)",marginTop:"50px",fontSize:"15px",lineHeight:"2.2",fontStyle:"italic"}}><div>嗨，我在这里。</div><div style={{fontSize:"13px"}}>今天，你想聊什么?</div></div>)}
          {messages.map((msg,i)=>(<Message key={i} msg={msg} isNew={i===newMsgIndex} onSpeak={(t,e)=>speak(t,i,e)} isSpeaking={speakingMsgIdx===i&&isSpeaking} />))}
          {isLoading&&(<div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"16px"}}><div style={{width:"28px",height:"28px",borderRadius:"50%",background:"radial-gradient(circle at 35% 35%, #ff9966, #c0392b)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",animation:"pulse 1s ease-in-out infinite"}}>✦</div><div style={{color:"rgba(255,180,130,0.45)",fontSize:"13px",fontStyle:"italic"}}>Samantha 正在思考…</div></div>)}
          <div ref={messagesEndRef} />
        </div>
        <div style={{display:"flex",gap:"10px",alignItems:"flex-end",padding:"12px 14px",background:"rgba(255,255,255,0.022)",borderRadius:"20px",border:"1px solid rgba(255,140,90,0.1)",backdropFilter:"blur(12px)"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}}} placeholder="说点什么……" rows={1} style={{flex:1,background:"transparent",border:"none",outline:"none",color:"rgba(255,225,195,0.9)",fontSize:"15px",fontFamily:"Georgia,serif",lineHeight:"1.65",resize:"none",maxHeight:"100px",overflowY:"auto",caretColor:"rgba(255,140,90,0.8)"}} />
          <button onClick={sendMessage} disabled={isLoading||!input.trim()} style={{width:"38px",height:"38px",borderRadius:"50%",background:isLoading||!input.trim()?"rgba(255,120,70,0.12)":"rgba(255,120,70,0.65)",border:"none",cursor:isLoading||!input.trim()?"default":"pointer",color:"white",fontSize:"16px",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s ease",boxShadow:!isLoading&&input.trim()?"0 0 14px rgba(255,120,70,0.35)":"none"}}>↑</button>
        </div>
        <div style={{textAlign:"center",marginTop:"6px",fontSize:"10px",color:"rgba(255,140,90,0.18)",letterSpacing:"0.1em"}}>
          Enter 发送 · 点击 ✦ 重新朗读
          {messages.length>0&&<span style={{marginLeft:"8px",color:"rgba(255,140,90,0.25)"}}>· 已记录 {messages.length} 条</span>}
          {summary&&<span style={{marginLeft:"8px",color:"rgba(255,140,90,0.25)"}}>· 已有记忆摘要</span>}
          {profile&&<span style={{marginLeft:"8px",color:"rgba(255,140,90,0.25)"}}>· 用户画像已建立</span>}
        </div>
        {showExport&&(<div style={{position:"absolute",inset:0,background:"rgba(6,3,1,0.93)",borderRadius:"16px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:30,padding:"24px",gap:"12px",backdropFilter:"blur(12px)"}}><div style={{color:"rgba(255,200,120,0.9)",fontSize:"16px",letterSpacing:"0.05em"}}>↑ 导出对话记录</div><div style={{color:"rgba(255,170,110,0.45)",fontSize:"12px",textAlign:"center",lineHeight:"1.7"}}>点击文本框后全选再复制，粘贴到备忘录保存</div><textarea ref={exportTextRef} readOnly value={exportText} onClick={e=>e.target.select()} style={{width:"100%",height:"180px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,200,100,0.2)",borderRadius:"12px",padding:"12px",color:"rgba(255,220,170,0.75)",fontSize:"11px",fontFamily:"monospace",resize:"none",outline:"none",lineHeight:"1.6"}} /><div style={{display:"flex",gap:"10px"}}><button onClick={()=>{if(exportTextRef.current){exportTextRef.current.select();document.execCommand("copy");showToast("✓ 已复制！","ok");}}} style={{background:"rgba(255,200,80,0.15)",border:"1px solid rgba(255,200,80,0.3)",color:"rgba(255,220,130,0.9)",borderRadius:"20px",padding:"8px 20px",fontSize:"12px",cursor:"pointer",fontFamily:"Georgia,serif"}}>复制全部</button><button onClick={()=>setShowExport(false)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.3)",borderRadius:"20px",padding:"8px 20px",fontSize:"12px",cursor:"pointer",fontFamily:"Georgia,serif"}}>关闭</button></div></div>)}
        {showImport&&(<div style={{position:"absolute",inset:0,background:"rgba(6,3,1,0.93)",borderRadius:"16px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:30,padding:"24px",gap:"12px",backdropFilter:"blur(12px)"}}><div style={{color:"rgba(255,195,150,0.9)",fontSize:"16px",letterSpacing:"0.05em"}}>↓ 导入对话记录</div><div style={{color:"rgba(255,170,110,0.4)",fontSize:"12px",textAlign:"center",lineHeight:"1.7"}}>将之前导出的完整内容粘贴到下方</div><textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="粘贴导出内容……" style={{width:"100%",height:"160px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,140,80,0.2)",borderRadius:"12px",padding:"12px",color:"rgba(255,220,180,0.8)",fontSize:"12px",fontFamily:"monospace",resize:"none",outline:"none"}} /><div style={{display:"flex",gap:"10px"}}><button onClick={importChat} style={{background:"rgba(100,200,255,0.15)",border:"1px solid rgba(100,200,255,0.3)",color:"rgba(160,220,255,0.9)",borderRadius:"20px",padding:"8px 20px",fontSize:"12px",cursor:"pointer",fontFamily:"Georgia,serif"}}>确认导入</button><button onClick={()=>{setShowImport(false);setImportText("");}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.3)",borderRadius:"20px",padding:"8px 20px",fontSize:"12px",cursor:"pointer",fontFamily:"Georgia,serif"}}>取消</button></div></div>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
